<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{layout :: head('Leaderboard')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-5">

    <div class="d-flex justify-content-between align-items-start mb-5 flex-wrap gap-3">
        <div>
            <h1 class="page-title mb-1">Wall of Shame</h1>
            <p style="color:#6a5a42;font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;">
                All bosses ranked by death count
            </p>
        </div>
        <a th:href="@{/leaderboard/export}" class="btn btn-outline-secondary btn-sm">
            Export CSV
        </a>
    </div>

    <!-- Search + filter controls -->
    <div th:unless="${rows.empty}" class="d-flex gap-2 flex-wrap mb-4 align-items-center">
        <input type="text" id="lbSearch" class="form-control form-control-sm"
               style="max-width:220px;background:#0d0c0a;border-color:#4a3a2a;color:#d3c5a1;"
               placeholder="Search boss...">
        <select id="lbGame" class="form-select form-select-sm"
                style="max-width:180px;background:#0d0c0a;border-color:#4a3a2a;color:#d3c5a1;">
            <option value="">All Games</option>
        </select>
        <select id="lbArea" class="form-select form-select-sm"
                style="max-width:180px;background:#0d0c0a;border-color:#4a3a2a;color:#d3c5a1;">
            <option value="">All Areas</option>
        </select>
    </div>

    <div th:if="${rows.empty}" class="text-center py-5" style="color:#6a5a42;font-style:italic;">
        No deaths logged yet. Go touch some bosses.
    </div>

    <div class="card" th:unless="${rows.empty}">
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th scope="col" class="section-title" style="border:none;padding-bottom:0.75rem;">#</th>

                        <th scope="col" class="section-title" style="border:none;padding-bottom:0.75rem;">
                            <a th:href="@{/leaderboard(sort='name', dir=${sort == 'name' and dir == 'asc'} ? 'desc' : 'asc')}"
                               class="d-flex align-items-center gap-1" style="color:#8a7a62;">
                                Boss
                                <span th:if="${sort == 'name'}" th:text="${dir == 'asc'} ? '▲' : '▼'"></span>
                            </a>
                        </th>

                        <th scope="col" class="section-title" style="border:none;padding-bottom:0.75rem;">
                            <a th:href="@{/leaderboard(sort='game', dir=${sort == 'game' and dir == 'asc'} ? 'desc' : 'asc')}"
                               class="d-flex align-items-center gap-1" style="color:#8a7a62;">
                                Game
                                <span th:if="${sort == 'game'}" th:text="${dir == 'asc'} ? '▲' : '▼'"></span>
                            </a>
                        </th>

                        <th scope="col" class="section-title" style="border:none;padding-bottom:0.75rem;">
                            <a th:href="@{/leaderboard(sort='deaths', dir=${sort == 'deaths' and dir == 'asc'} ? 'desc' : 'asc')}"
                               class="d-flex align-items-center gap-1" style="color:#8a7a62;">
                                Deaths
                                <span th:if="${sort == 'deaths'}" th:text="${dir == 'asc'} ? '▲' : '▼'"></span>
                            </a>
                        </th>

                        <th scope="col" class="section-title" style="border:none;padding-bottom:0.75rem;">
                            <a th:href="@{/leaderboard(sort='cleared', dir=${sort == 'cleared' and dir == 'asc'} ? 'desc' : 'asc')}"
                               class="d-flex align-items-center gap-1" style="color:#8a7a62;">
                                Status
                                <span th:if="${sort == 'cleared'}" th:text="${dir == 'asc'} ? '▲' : '▼'"></span>
                            </a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row, stat : ${rows}"
                        th:attr="data-boss=${row.bossName}, data-game=${row.gameName}, data-area=${row.bossArea}">
                        <td style="color:#6a5a42;font-family:'Cinzel',serif;font-size:0.8rem;"
                            th:text="${stat.index + 1}">1</td>
                        <td>
                            <a th:href="@{/games/{slug}/bosses/{id}(slug=${row.gameSlug}, id=${row.bossId})}"
                               class="boss-name-link"
                               th:text="${row.bossName}">Boss</a>
                        </td>
                        <td style="color:#8a7a62;" th:text="${row.gameName}">Game</td>
                        <td>
                            <span th:class="${row.deaths > 0} ? 'death-count' : ''"
                                  th:style="${row.deaths == 0} ? 'color:#6a5a42;font-family:Cinzel,serif;' : ''"
                                  style="font-size:1.1rem;"
                                  th:text="${row.deaths}">0</span>
                        </td>
                        <td>
                            <span th:if="${row.cleared}"    class="badge bg-success">Cleared</span>
                            <span th:unless="${row.cleared}" class="badge bg-secondary">Remaining</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p style="color:#6a5a42;font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:1px;"
       class="mt-2 text-end" th:unless="${rows.empty}"
       th:text="${rows.size()} + ' bosses total'"></p>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    var rows = Array.from(document.querySelectorAll('tbody tr[data-boss]'));
    var searchEl = document.getElementById('lbSearch');
    var gameEl   = document.getElementById('lbGame');
    var areaEl   = document.getElementById('lbArea');
    if (!searchEl) return;

    // Build dropdowns from data attributes
    var games = new Set(), areas = new Set();
    rows.forEach(function (r) {
        if (r.dataset.game) games.add(r.dataset.game);
        if (r.dataset.area) areas.add(r.dataset.area);
    });
    Array.from(games).sort().forEach(function (g) {
        var o = document.createElement('option');
        o.value = g; o.textContent = g;
        gameEl.appendChild(o);
    });
    Array.from(areas).sort().forEach(function (a) {
        var o = document.createElement('option');
        o.value = a; o.textContent = a;
        areaEl.appendChild(o);
    });

    function filter() {
        var q  = searchEl.value.toLowerCase();
        var g  = gameEl.value;
        var a  = areaEl.value;
        var rank = 1;
        rows.forEach(function (r) {
            var show = (!q || r.dataset.boss.toLowerCase().includes(q))
                    && (!g || r.dataset.game === g)
                    && (!a || r.dataset.area === a);
            r.style.display = show ? '' : 'none';
            if (show) r.cells[0].textContent = rank++;
        });
    }

    searchEl.addEventListener('input', filter);
    gameEl.addEventListener('change', filter);
    areaEl.addEventListener('change', filter);
})();
</script>
</body>
</html>
