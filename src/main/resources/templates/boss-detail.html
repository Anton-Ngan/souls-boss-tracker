<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{layout :: head(${boss.name})}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-5">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/games}">Games</a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/games/{slug}(slug=${game.slug})}" th:text="${game.name}">Game</a>
            </li>
            <li class="breadcrumb-item active" style="color:#8a7a62;" th:text="${boss.name}">Boss</li>
        </ol>
    </nav>

    <div class="row g-4">

        <!-- Left column -->
        <div class="col-lg-6">

            <!-- Boss image -->
            <div th:if="${boss.imageUrl}"
                 class="boss-portrait mb-4"
                 style="height:260px;border:1px solid #4a3a2a;"
                 th:style="'height:260px;border:1px solid #4a3a2a;background-image:url(' + ${boss.imageUrl} + ')'">
            </div>
            <div th:unless="${boss.imageUrl}"
                 class="boss-portrait-placeholder mb-4"
                 style="height:200px;border:1px solid #4a3a2a;">
                <span class="page-title" style="font-size:1rem;text-align:center;padding:0 1rem;"
                      th:text="${boss.name}">Boss Name</span>
                <span class="boss-portrait-area mt-1" th:text="${boss.area}">Area</span>
            </div>

            <!-- Title + status -->
            <div class="d-flex align-items-center flex-wrap gap-3 mb-2">
                <h1 class="page-title mb-0" style="font-size:1.4rem;" th:text="${boss.name}">Boss Name</h1>
                <span th:if="${boss.cleared}"    class="badge bg-success">Cleared</span>
                <span th:unless="${boss.cleared}" class="badge bg-danger">Not Cleared</span>
            </div>

            <p class="mb-4">
                <span th:if="${boss.area}" class="badge bg-secondary" th:text="${boss.area}">Area</span>
            </p>

            <!-- Stats -->
            <div class="row g-2 mb-4">
                <div class="col-6">
                    <div class="stat-card">
                        <div class="stat-number" th:text="${boss.deathCount}">0</div>
                        <div class="stat-label">Deaths</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="stat-card">
                        <div class="stat-number" th:text="${attempts.size()}">0</div>
                        <div class="stat-label">Total Attempts</div>
                    </div>
                </div>
            </div>

            <!-- Lore -->
            <div th:if="${boss.lore}" class="mb-4">
                <p class="section-title">Lore</p>
                <p class="lore-text mb-0" th:text="${boss.lore}">Lore text</p>
            </div>

            <hr class="gold-divider">

            <!-- Action buttons -->
            <div class="d-flex gap-2 flex-wrap mb-4">
                <form th:action="@{/games/{slug}/bosses/{id}/attempt(slug=${game.slug},id=${boss.id})}"
                      method="post">
                    <input type="hidden" name="source" value="detail">
                    <button type="submit" class="btn btn-danger">Log Death</button>
                </form>
                <form th:action="@{/games/{slug}/bosses/{id}/clear(slug=${game.slug},id=${boss.id})}"
                      method="post">
                    <input type="hidden" name="source" value="detail">
                    <button type="submit"
                            th:class="${boss.cleared} ? 'btn btn-outline-secondary' : 'btn btn-success'"
                            th:text="${boss.cleared} ? 'Mark Not Cleared' : 'Mark Cleared'">Clear</button>
                </form>
                <form th:action="@{/games/{slug}/bosses/{id}/reset(slug=${game.slug},id=${boss.id})}"
                      method="post">
                    <input type="hidden" name="source" value="detail">
                    <button type="submit" class="btn btn-reset"
                            onclick="return confirm('Reset all deaths for this boss?')">Reset Deaths</button>
                </form>
            </div>

            <!-- Notes -->
            <div class="card">
                <div class="card-body">
                    <p class="section-title">Notes</p>
                    <form th:action="@{/games/{slug}/bosses/{id}/notes(slug=${game.slug},id=${boss.id})}"
                          method="post">
                        <textarea class="form-control mb-2"
                                  name="notes" rows="4"
                                  placeholder="e.g. tried jumping attack strat..."
                                  th:text="${boss.notes}"></textarea>
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Save Notes</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Right column -->
        <div class="col-lg-6">

            <div class="card mb-4">
                <div class="card-body">
                    <p class="section-title">Attempts Over Time</p>
                    <canvas id="attemptsChart"></canvas>
                    <p th:if="${attempts.empty}" class="small text-center mt-3 mb-0"
                       style="color:#6a5a42;font-style:italic;">
                        No attempts yet — log a death to start tracking.
                    </p>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <p class="section-title">
                        Attempt History
                        <span class="badge bg-secondary ms-1" th:text="${attempts.size()}">0</span>
                    </p>

                    <p th:if="${attempts.empty}" class="small mb-0"
                       style="color:#6a5a42;font-style:italic;">
                        No attempts logged yet.
                    </p>

                    <ul class="list-group list-group-flush" th:unless="${attempts.empty}">
                        <li class="list-group-item d-flex justify-content-between align-items-center py-2"
                            th:each="attempt : ${attempts}">
                            <div class="d-flex align-items-center gap-2">
                                <span th:if="${attempt.died}"    class="badge bg-danger">Death</span>
                                <span th:unless="${attempt.died}" class="badge bg-success">Survived</span>
                                <small style="color:#8a7a62;"
                                       th:text="${#temporals.format(attempt.attemptedAt, 'dd MMM yyyy HH:mm')}">Date</small>
                            </div>
                            <small th:if="${attempt.notes}" style="color:#8a7a62;font-style:italic;"
                                   th:text="${attempt.notes}">note</small>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:src="@{/js/charts.js}"></script>
</body>
</html>
