<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{layout :: head(${game.name})}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-5">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/games}">Games</a>
            </li>
            <li class="breadcrumb-item active" style="color:#8a7a62;" th:text="${game.name}">Game</li>
        </ol>
    </nav>

    <h1 class="page-title mb-4" th:text="${game.name}">Game Name</h1>

    <!-- Search + area filter -->
    <form th:action="@{/games/{slug}(slug=${game.slug})}" method="get" class="mb-3">
        <div class="d-flex gap-2 flex-wrap align-items-center">
            <input type="text" name="q" th:value="${q}"
                   class="form-control form-control-sm"
                   style="max-width:260px;background:#0d0c0a;border-color:#4a3a2a;color:#d3c5a1;"
                   placeholder="Search bosses...">
            <input type="hidden" name="filter" th:value="${filter}">
            <select name="area" class="form-select form-select-sm"
                    style="max-width:200px;background:#0d0c0a;border-color:#4a3a2a;color:#d3c5a1;">
                <option value="" th:selected="${area == ''}">All Areas</option>
                <option th:each="a : ${areas}" th:value="${a}" th:text="${a}"
                        th:selected="${a == area}"></option>
            </select>
            <button type="submit" class="btn btn-outline-secondary btn-sm">Filter</button>
            <a th:href="@{/games/{slug}(slug=${game.slug})}" class="btn btn-outline-secondary btn-sm">Clear</a>
        </div>
    </form>

    <!-- Filter pills -->
    <div class="mb-4 d-flex align-items-center gap-2 flex-wrap">
        <a th:href="@{/games/{slug}(slug=${game.slug}, filter='all', q=${q}, area=${area})}"
           th:classappend="${filter == 'all'} ? ' active'"
           class="filter-btn">All</a>
        <a th:href="@{/games/{slug}(slug=${game.slug}, filter='cleared', q=${q}, area=${area})}"
           th:classappend="${filter == 'cleared'} ? ' active-cleared'"
           class="filter-btn">Cleared</a>
        <a th:href="@{/games/{slug}(slug=${game.slug}, filter='remaining', q=${q}, area=${area})}"
           th:classappend="${filter == 'remaining'} ? ' active-remaining'"
           class="filter-btn">Remaining</a>
        <span style="color:#6a5a42;font-size:0.8rem;font-family:'Cinzel',serif;letter-spacing:1px;"
              class="ms-1" th:text="${bosses.size()} + ' bosses'"></span>
    </div>

    <!-- Boss grid -->
    <div class="row g-3" th:unless="${bosses.empty}">
        <div class="col-sm-6 col-lg-4" th:each="boss : ${bosses}">
            <div class="card h-100 boss-card"
                 th:classappend="${boss.cleared} ? ' cleared'">

                <!-- Boss portrait -->
                <div th:if="${boss.imageUrl}"
                     class="boss-portrait"
                     th:style="'background-image: url(' + ${boss.imageUrl} + ')'">
                </div>
                <div th:unless="${boss.imageUrl}" class="boss-portrait-placeholder">
                    <span class="boss-portrait-area" th:text="${boss.area}">Area</span>
                </div>

                <div class="card-body d-flex flex-column pt-3">

                    <!-- Name + status -->
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0" style="flex:1;">
                            <a th:href="@{/games/{slug}/bosses/{id}(slug=${game.slug}, id=${boss.id})}"
                               class="boss-name-link"
                               th:text="${boss.name}">Boss Name</a>
                        </h5>
                        <span th:if="${boss.cleared}"    class="badge bg-success ms-2 text-nowrap">Cleared</span>
                        <span th:unless="${boss.cleared}" class="badge bg-danger ms-2 text-nowrap">Remaining</span>
                    </div>

                    <!-- Death count -->
                    <div class="d-flex align-items-baseline gap-1 mb-3 mt-auto">
                        <span class="death-count" th:text="${boss.deathCount}">0</span>
                        <span style="color:#6a5a42;font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;">deaths</span>
                    </div>

                    <!-- Action buttons -->
                    <div class="d-flex gap-2 flex-wrap">
                        <form th:action="@{/games/{slug}/bosses/{id}/attempt(slug=${game.slug},id=${boss.id})}"
                              method="post" style="flex:1;">
                            <input type="hidden" name="source" value="list">
                            <input type="hidden" name="filter" th:value="${filter}">
                            <input type="hidden" name="q"      th:value="${q}">
                            <input type="hidden" name="area"   th:value="${area}">
                            <button type="submit" class="btn btn-danger btn-sm w-100">Log Death</button>
                        </form>
                        <form th:action="@{/games/{slug}/bosses/{id}/clear(slug=${game.slug},id=${boss.id})}"
                              method="post">
                            <input type="hidden" name="source" value="list">
                            <input type="hidden" name="filter" th:value="${filter}">
                            <input type="hidden" name="q"      th:value="${q}">
                            <input type="hidden" name="area"   th:value="${area}">
                            <button type="submit"
                                    th:class="${boss.cleared} ? 'btn btn-outline-secondary btn-sm' : 'btn btn-outline-success btn-sm'"
                                    th:text="${boss.cleared} ? 'Uncleared' : 'Cleared'">Cleared</button>
                        </form>
                        <form th:action="@{/games/{slug}/bosses/{id}/reset(slug=${game.slug},id=${boss.id})}"
                              method="post">
                            <input type="hidden" name="source" value="list">
                            <input type="hidden" name="filter" th:value="${filter}">
                            <input type="hidden" name="q"      th:value="${q}">
                            <input type="hidden" name="area"   th:value="${area}">
                            <button type="submit" class="btn btn-reset btn-sm"
                                    onclick="return confirm('Reset all deaths for this boss?')">Reset</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${bosses.empty}" class="text-center py-5" style="color:#6a5a42;font-style:italic;">
        <p>No bosses match this filter.</p>
        <a th:href="@{/games/{slug}(slug=${game.slug})}" class="btn btn-outline-secondary btn-sm">Show all</a>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
