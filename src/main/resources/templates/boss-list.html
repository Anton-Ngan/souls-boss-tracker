<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{layout :: head(${game.name})}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/games}" class="text-warning">Games</a>
            </li>
            <li class="breadcrumb-item active" th:text="${game.name}">Game</li>
        </ol>
    </nav>

    <h1 class="mb-4" th:text="${game.name}">Game Name</h1>

    <!-- Filter pills -->
    <div class="mb-4 d-flex align-items-center gap-2 flex-wrap">
        <a th:href="@{/games/{slug}(slug=${game.slug}, filter='all')}"
           th:classappend="${filter == 'all'} ? ' active'"
           class="btn btn-sm btn-outline-secondary">All</a>
        <a th:href="@{/games/{slug}(slug=${game.slug}, filter='cleared')}"
           th:classappend="${filter == 'cleared'} ? ' active'"
           class="btn btn-sm btn-outline-success">Cleared</a>
        <a th:href="@{/games/{slug}(slug=${game.slug}, filter='remaining')}"
           th:classappend="${filter == 'remaining'} ? ' active'"
           class="btn btn-sm btn-outline-danger">Remaining</a>
        <span class="text-muted small ms-1" th:text="${bosses.size()} + ' bosses'"></span>
    </div>

    <!-- Boss grid -->
    <div class="row g-3" th:unless="${bosses.empty}">
        <div class="col-sm-6 col-lg-4" th:each="boss : ${bosses}">
            <div class="card h-100 border-secondary boss-card"
                 th:classappend="${boss.cleared} ? ' cleared'">
                <div class="card-body d-flex flex-column">

                    <!-- Name + status -->
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0">
                            <a th:href="@{/games/{slug}/bosses/{id}(slug=${game.slug}, id=${boss.id})}"
                               class="text-decoration-none text-light"
                               th:text="${boss.name}">Boss Name</a>
                        </h5>
                        <span th:if="${boss.cleared}"   class="badge bg-success ms-2 text-nowrap">Cleared</span>
                        <span th:unless="${boss.cleared}" class="badge bg-danger ms-2 text-nowrap">Remaining</span>
                    </div>

                    <!-- Area -->
                    <p class="mb-2">
                        <span th:if="${boss.area}" class="badge bg-secondary small"
                              th:text="${boss.area}">Area</span>
                    </p>

                    <!-- Death count -->
                    <div class="d-flex align-items-baseline gap-1 mb-3 mt-auto">
                        <span class="fs-3 fw-bold text-danger lh-1" th:text="${boss.deathCount}">0</span>
                        <span class="text-muted small">deaths</span>
                    </div>

                    <!-- Action buttons -->
                    <div class="d-flex gap-2">
                        <form th:action="@{/games/{slug}/bosses/{id}/attempt(slug=${game.slug},id=${boss.id})}"
                              method="post" class="flex-grow-1">
                            <input type="hidden" name="source" value="list">
                            <button type="submit" class="btn btn-danger btn-sm w-100">+ Death</button>
                        </form>
                        <form th:action="@{/games/{slug}/bosses/{id}/clear(slug=${game.slug},id=${boss.id})}"
                              method="post">
                            <input type="hidden" name="source" value="list">
                            <button type="submit"
                                    th:class="${boss.cleared} ? 'btn btn-sm btn-outline-secondary' : 'btn btn-sm btn-outline-success'"
                                    th:text="${boss.cleared} ? '✗' : '✓'">✓</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${bosses.empty}" class="text-center py-5">
        <p class="text-muted">No bosses match this filter.</p>
        <a th:href="@{/games/{slug}(slug=${game.slug})}" class="btn btn-outline-secondary btn-sm">Show all</a>
    </div>

</main>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
