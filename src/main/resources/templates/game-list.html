<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{layout :: head('Games')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-5">
    <h1 class="page-title mb-5">Select a Game</h1>

    <div class="row g-4">
        <div class="col-sm-6 col-lg-4" th:each="game : ${games}">
            <a th:href="@{/games/{slug}(slug=${game.slug})}" class="text-decoration-none">
                <div class="card h-100 game-card">
                    <div class="game-banner" th:classappend="'banner-' + ${game.slug}">
                        <img th:if="${game.coverImage}"
                             th:src="${game.coverImage}"
                             class="game-cover-img"
                             onerror="this.style.display='none'"
                             alt="">
                        <div class="game-banner-overlay">
                            <span class="game-banner-title" th:text="${game.name}">Game Name</span>
                        </div>
                    </div>
                    <div class="card-body py-3">
                        <div class="d-flex gap-2 flex-wrap">
                            <span class="badge bg-secondary"
                                  th:text="${game.bosses.size()} + ' bosses'">0 bosses</span>
                            <span class="badge bg-success"
                                  th:text="${game.clearedCount} + ' cleared'">0 cleared</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
