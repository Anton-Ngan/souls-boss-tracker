<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{layout :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-5">
    <h1 class="page-title mb-5">Dashboard</h1>

    <!-- Stat cards -->
    <div class="row g-3 mb-5">
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalDeaths}">0</div>
                <div class="stat-label">Total Deaths</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-number" th:text="${bossesCleared}">0</div>
                <div class="stat-label">Bosses Cleared</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-number" th:text="${gamesInProgress}">0</div>
                <div class="stat-label">Games in Progress</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-number" th:text="${longestStreak}">0</div>
                <div class="stat-label">Longest No-Death Streak</div>
            </div>
        </div>
    </div>

    <!-- Charts row -->
    <div class="row g-4 mb-5">
        <div class="col-lg-7">
            <div class="card h-100">
                <div class="card-body">
                    <p class="section-title">Top 10 Bosses by Deaths</p>
                    <div th:if="${totalDeaths == 0}" class="text-center py-4"
                         style="color:#6a5a42; font-style:italic;">
                        No deaths logged yet. Go touch some bosses.
                    </div>
                    <canvas id="topBossesChart" th:unless="${totalDeaths == 0}"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card h-100">
                <div class="card-body">
                    <p class="section-title">Completion by Game</p>
                    <canvas id="gameCompletionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent activity -->
    <div class="card">
        <div class="card-body">
            <p class="section-title">Recent Activity</p>
            <div th:if="${recentActivity.empty}" style="color:#6a5a42; font-style:italic;" class="small">
                No activity yet.
            </div>
            <ul class="list-group list-group-flush" th:unless="${recentActivity.empty}">
                <li class="list-group-item d-flex justify-content-between align-items-center py-2"
                    th:each="attempt : ${recentActivity}">
                    <div class="d-flex align-items-center gap-2">
                        <span th:if="${attempt.died}"     class="badge bg-danger">Death</span>
                        <span th:unless="${attempt.died}" class="badge bg-success">Survived</span>
                        <span style="font-family:'Cinzel',serif;font-size:0.8rem;"
                              th:text="${attempt.boss.name}">Boss</span>
                        <span style="color:#8a7a62;font-size:0.85rem;"
                              th:text="'— ' + ${attempt.boss.game.name}">Game</span>
                    </div>
                    <small style="color:#6a5a42;"
                           th:text="${#temporals.format(attempt.attemptedAt, 'dd MMM yyyy HH:mm')}">Date</small>
                </li>
            </ul>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const dashboardData = {
        topBossLabels : /*[[${topBossLabels}]]*/ [],
        topBossDeaths : /*[[${topBossDeaths}]]*/ [],
        gameLabels    : /*[[${gameLabels}]]*/    [],
        gameCleared   : /*[[${gameCleared}]]*/   [],
        gameTotal     : /*[[${gameTotal}]]*/     []
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:src="@{/js/charts.js}"></script>
</body>
</html>
