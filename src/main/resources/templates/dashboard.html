<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head th:replace="~{layout :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-4">
    <h1 class="mb-4">Dashboard</h1>

    <!-- Stat cards -->
    <div class="row g-3 mb-5">
        <div class="col-6 col-lg-3">
            <div class="card border-danger text-center py-3">
                <div class="fs-1 fw-bold text-danger" th:text="${totalDeaths}">0</div>
                <div class="text-muted small">Total Deaths</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card border-success text-center py-3">
                <div class="fs-1 fw-bold text-success" th:text="${bossesCleared}">0</div>
                <div class="text-muted small">Bosses Cleared</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card border-warning text-center py-3">
                <div class="fs-1 fw-bold text-warning" th:text="${gamesInProgress}">0</div>
                <div class="text-muted small">Games in Progress</div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card border-info text-center py-3">
                <div class="fs-1 fw-bold text-info" th:text="${longestStreak}">0</div>
                <div class="text-muted small">Longest No-Death Streak</div>
            </div>
        </div>
    </div>

    <!-- Charts row -->
    <div class="row g-4 mb-5">
        <!-- Top bosses bar chart -->
        <div class="col-lg-7">
            <div class="card border-secondary h-100">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase small mb-3">Top 10 Bosses by Deaths</h6>
                    <div th:if="${totalDeaths == 0}" class="text-muted text-center py-4 small">
                        No deaths logged yet. Get out there and die heroically.
                    </div>
                    <canvas id="topBossesChart" th:unless="${totalDeaths == 0}"></canvas>
                </div>
            </div>
        </div>

        <!-- Game completion doughnut -->
        <div class="col-lg-5">
            <div class="card border-secondary h-100">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase small mb-3">Completion by Game</h6>
                    <canvas id="gameCompletionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent activity -->
    <div class="card border-secondary">
        <div class="card-body">
            <h6 class="text-muted text-uppercase small mb-3">Recent Activity</h6>
            <div th:if="${recentActivity.empty}" class="text-muted small">
                No activity yet.
            </div>
            <ul class="list-group list-group-flush" th:unless="${recentActivity.empty}">
                <li class="list-group-item bg-transparent border-secondary d-flex justify-content-between align-items-center py-2"
                    th:each="attempt : ${recentActivity}">
                    <div class="d-flex align-items-center gap-2">
                        <span th:if="${attempt.died}"    class="badge bg-danger">Death</span>
                        <span th:unless="${attempt.died}" class="badge bg-success">Survived</span>
                        <span class="fw-semibold small" th:text="${attempt.boss.name}">Boss</span>
                        <span class="text-muted small" th:text="'— ' + ${attempt.boss.game.name}">Game</span>
                    </div>
                    <small class="text-muted"
                           th:text="${#temporals.format(attempt.attemptedAt, 'dd MMM yyyy HH:mm')}">Date</small>
                </li>
            </ul>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<!-- Chart data injected for charts.js -->
<script th:inline="javascript">
    const dashboardData = {
        topBossLabels : /*[[${topBossLabels}]]*/ [],
        topBossDeaths : /*[[${topBossDeaths}]]*/ [],
        gameLabels    : /*[[${gameLabels}]]*/    [],
        gameCleared   : /*[[${gameCleared}]]*/   [],
        gameTotal     : /*[[${gameTotal}]]*/     []
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:src="@{/js/charts.js}"></script>
</body>
</html>
