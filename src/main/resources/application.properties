spring.application.name=SoulsBossTracker

# H2 in-memory database (dev)
spring.datasource.url=jdbc:h2:mem:soulsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console for dev inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# App credentials (override via env vars in prod)
app.username=${APP_USERNAME:admin}
app.password=${APP_PASSWORD:admin}
